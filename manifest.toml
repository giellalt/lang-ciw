# Name of the speller package in various languages.
# The default is English + autonym:
[speller.name]
en = "Anishinaabemowin (Southwestern Ojibwe) spellchecker"
ciw = "Autonym spellchecker"

# Description of the speller package in various languages.
# The default is English + autonym:
[speller.description]
en = "A spellchecker for Anishinaabemowin (Southwestern Ojibwe), made by members of the language community, and by the Divvun and Giellatekno groups at UiT The Arctic University of Norway"
ciw = "TRANSLATE: A spellchecker for Anishinaabemowin (Southwestern Ojibwe), made by members of the language community, and by the Divvun and Giellatekno groups at UiT The Arctic University of Norway"

[macos]
